services:
  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment: #Will use seperate redis services in production for then
      - DATABASE_URL=postgresql://user:password@postgres:5432/app_db
      - REDIS_CACHE_URL=${REDIS_CACHE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d # Initialize the db

  db_test:
    image: postgres:15
    container_name: postgres_db_test
    restart: always
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: password_test
      POSTGRES_DB: test_app_db
    # ports:
    #   - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d # Initialize the db

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    depends_on:
      - redis
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/app_db
      - REDIS_CACHE_URL=${REDIS_CACHE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    env_file:
      - .env
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

volumes:
  postgres_data:
  postgres_test_data:
