<!-- app/templates/emails/base.html -->
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .header {
        background-color: #0f172a;
        padding: 32px;
        text-align: center;
      }
      .header h1 {
        color: #ffffff;
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }
      .body {
        padding: 40px 32px;
        color: #374151;
        line-height: 1.6;
      }
      .field {
        margin: 16px 0;
        padding: 12px 16px;
        background: #f9fafb;
        border-left: 3px solid #0f172a;
        border-radius: 0 4px 4px 0;
      }
      .field-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .field-value {
        font-size: 15px;
        color: #111827;
        font-weight: 500;
      }
      .button {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 24px;
        background-color: #0f172a;
        color: #ffffff;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
      }
      .footer {
        padding: 24px 32px;
        background: #f9fafb;
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        border-top: 1px solid #e5e7eb;
      }
      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }
      .status-completed {
        background: #dcfce7;
        color: #166534;
      }
      .status-failed {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Research Paper API</h1>
      </div>
      <div class="body">{% block content %}{% endblock %}</div>
      <div class="footer">
        <p>You're receiving this because you have an account at Research Paper API.</p>
        <p>© 2026 Research Paper API. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
